name: Vendorlot
options:
  bundleIdPrefix: com.shimondeitel.yardsaleledger
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  groupSortPosition: top
settings:
  base:
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.0"
    DEVELOPMENT_TEAM: "W7Q885Q59C"
    CODE_SIGN_STYLE: Automatic
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    TARGETED_DEVICE_FAMILY: "1"
    ENABLE_USER_SCRIPT_SANDBOXING: "YES"
targets:
  Vendorlot:
    type: application
    platform: iOS
    sources:
      - path: Vendorlot
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.yardsaleledger
        TARGETED_DEVICE_FAMILY: "1"
        INFOPLIST_FILE: Vendorlot/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        ENABLE_PREVIEWS: "YES"
        GENERATE_INFOPLIST_FILE: "NO"
  VendorlotTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: VendorlotTests
      - path: Vendorlot.storekit
    dependencies:
      - target: Vendorlot
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.yardsaleledger.tests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
  VendorlotUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: VendorlotUITests
    dependencies:
      - target: Vendorlot
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.yardsaleledger.uitests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
schemes:
  Vendorlot:
    build:
      targets:
        Vendorlot: all
        VendorlotTests: [test]
        VendorlotUITests: [test]
    run:
      config: Debug
      storeKitConfiguration: Vendorlot.storekit
    test:
      config: Debug
      storeKitConfiguration: Vendorlot.storekit
      targets:
        - VendorlotTests
        - VendorlotUITests
    archive:
      config: Release
